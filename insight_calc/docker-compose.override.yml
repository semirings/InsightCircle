version: '3.9'

services:
  insight_calc:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./insight_calc:/app   # Mount local code
    working_dir: /app
    ports:
      - "5000:5000"           # Adjust for your app
    environment:
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=development # If using Flask/FastAPI dev mode
    command: python main.py   # Or your dev command